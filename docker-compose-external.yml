# External Services Only
# Use this for local development when running Sibyl server/client locally
# but want external services (Redis, MinIO, etc.) in containers
#
# Usage:
#   docker-compose -f docker-compose-external.yml up -d
#
# Stop:
#   docker-compose -f docker-compose-external.yml down

services:
  redis:
    image: redis:7-alpine
    container_name: sibyl-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - sibyl-external

  minio:
    image: minio/minio:latest
    container_name: sibyl-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=sibyl
      - MINIO_ROOT_PASSWORD=sibyl-password
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - sibyl-external

  postgres:
    image: postgres:17-alpine
    container_name: sibyl-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=sibyl
      - POSTGRES_PASSWORD=sibyl-password
      - POSTGRES_DB=sibyl
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sibyl -d sibyl"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sibyl-external
    profiles:
      - postgres

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: sibyl-elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - sibyl-external
    profiles:
      - search

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sibyl-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - sibyl-external
    profiles:
      - vector

volumes:
  redis-data:
    driver: local
  minio-data:
    driver: local
  postgres-data:
    driver: local
  elasticsearch-data:
    driver: local
  qdrant-data:
    driver: local

networks:
  sibyl-external:
    driver: bridge

# Usage Examples:
#
# Basic (Redis + MinIO):
#   docker-compose -f docker-compose-external.yml up -d
#
# With PostgreSQL:
#   docker-compose -f docker-compose-external.yml --profile postgres up -d
#
# With search (Elasticsearch):
#   docker-compose -f docker-compose-external.yml --profile search up -d
#
# With vector DB (Qdrant):
#   docker-compose -f docker-compose-external.yml --profile vector up -d
#
# All services:
#   docker-compose -f docker-compose-external.yml --profile postgres --profile search --profile vector up -d
#
# Connection strings:
#   Redis:      redis://localhost:6379
#   MinIO:      http://localhost:9000 (user: sibyl, pass: sibyl-password)
#   PostgreSQL: postgresql://sibyl:sibyl-password@localhost:5432/sibyl
#   Elasticsearch: http://localhost:9200
#   Qdrant:     http://localhost:6333
#
# MinIO Console: http://localhost:9001 (user: sibyl, pass: sibyl-password)